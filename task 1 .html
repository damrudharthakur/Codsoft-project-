<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CodBot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  h1 { color: #00e5ff; font-size: 1.5rem; margin: 14px 0 2px; }
  .subtitle { color: #aaa; font-size: 0.75rem; margin-bottom: 14px; }

  .chat-wrapper {
    width: 100%; max-width: 620px;
    display: flex; flex-direction: column;
    flex: 1;
  }

  .chat-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px;
    height: 62vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 12px;
    scroll-behavior: smooth;
  }
  .chat-box::-webkit-scrollbar { width: 4px; }
  .chat-box::-webkit-scrollbar-thumb { background: #7b2ff7; border-radius: 4px; }

  .msg { display: flex; gap: 8px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
  }
  .bot .avatar  { background: linear-gradient(135deg,#00e5ff,#7b2ff7); }
  .user .avatar { background: linear-gradient(135deg,#ff6b6b,#ffa500); }

  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 0.9rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bot .bubble {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #eee;
    border-top-left-radius: 4px;
  }
  .user .bubble {
    background: linear-gradient(135deg,#00e5ff22,#7b2ff722);
    border: 1px solid #7b2ff755;
    color: #fff;
    border-top-right-radius: 4px;
  }

  .typing .bubble { color: #aaa; font-style: italic; }

  /* Suggestions */
  .suggestions {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .sug-btn {
    padding: 6px 12px; border-radius: 20px;
    border: 1px solid rgba(0,229,255,0.3);
    background: rgba(0,229,255,0.08);
    color: #00e5ff; font-size: 0.75rem;
    cursor: pointer; transition: all 0.2s;
  }
  .sug-btn:hover { background: rgba(0,229,255,0.2); }

  /* Input Row */
  .input-row {
    display: flex; gap: 8px;
  }
  .input-row input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.07);
    color: #fff; font-size: 0.95rem; outline: none;
  }
  .input-row input::placeholder { color: #777; }
  .input-row input:focus { border-color: #00e5ff55; }
  .send-btn {
    padding: 12px 18px;
    border: none; border-radius: 12px;
    background: linear-gradient(90deg,#00e5ff,#7b2ff7);
    color: #fff; font-size: 1rem;
    cursor: pointer; transition: opacity 0.2s;
  }
  .send-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<h1>🤖 CodBot</h1>
<p class="subtitle">CodSoft AI Internship — Task 01 | Rule-Based Chatbot</p>

<div class="chat-wrapper">
  <div class="chat-box" id="chatBox"></div>

  <div class="suggestions" id="suggestions">
    <button class="sug-btn" onclick="quickSend('Hello!')">👋 Hello</button>
    <button class="sug-btn" onclick="quickSend('Tell me a joke')">😂 Joke</button>
    <button class="sug-btn" onclick="quickSend('What time is it?')">⏰ Time</button>
    <button class="sug-btn" onclick="quickSend('What can you do?')">💡 Help</button>
    <button class="sug-btn" onclick="quickSend('Tell me about Python')">🐍 Python</button>
  </div>

  <div class="input-row">
    <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()"/>
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
const rules = [
  [/hello|hi|hey|helo|hii/i, [
    "Hey there! 👋 How can I help you today?",
    "Hello! What's on your mind?",
    "Hi! I'm CodBot. Ask me anything! 😊"
  ]],
  [/how are you|how r u|you ok/i, [
    "I'm doing great, thanks! 😊 How about you?",
    "All good on my end! What about you?",
    "Feeling fantastic and ready to help! 🚀"
  ]],
  [/your name|who are you|aapka naam/i, [
    "I'm CodBot 🤖 — your rule-based AI assistant!",
    "They call me CodBot! Built with pure logic and Python. 😄"
  ]],
  [/how old|your age|aapki umar/i, [
    "I was born the moment someone ran this code! 😄",
    "Age? I'm timeless — just a bunch of smart rules. 🤖"
  ]],
  [/who made you|who created|who built|creator/i, [
    "I was built by a CodSoft AI intern using Python & JavaScript! 💻",
    "A passionate developer made me for CodSoft AI Internship Task 1! 🎯"
  ]],
  [/time|kitne baje/i, [
    () => `Current time is ⏰ ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`
  ]],
  [/date|today|aaj ki|aaj ka/i, [
    () => `Today is 📅 ${new Date().toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}`
  ]],
  [/weather|mausam|temperature/i, [
    "I can't check live weather, but I hope it's sunny! ☀️",
    "Try weather.com for accurate forecasts! 🌤️"
  ]],
  [/joke|funny|laugh|hasao/i, [
    "Why do programmers prefer dark mode?\nBecause light attracts bugs! 🐛😂",
    "Why did the Python dev go broke?\nHe used all his cache! 💸😄",
    "I told my computer I needed a break.\nNow it won't stop sending me Kit-Kat ads. 😂"
  ]],
  [/python|programming|coding/i, [
    "Python is awesome! 🐍 Clean syntax, powerful libraries — perfect for AI!",
    "Love Python? Me too! I'm literally built with it. 😄",
    "Python rocks for AI, web dev, data science — endless possibilities!"
  ]],
  [/artificial intelligence|machine learning|deep learning|\bai\b|\bml\b/i, [
    "AI is the future! 🤖 I'm a small but proud part of it.",
    "Machine learning is fascinating — neural networks to NLP, all exciting!",
    "Fun fact: I'm rule-based AI, not ML. Both are powerful! 💡"
  ]],
  [/help|what can you do|features/i, [
    "I can chat about:\n⏰ Time & Date\n😂 Jokes\n🐍 Python & AI\n😊 General conversation\n👋 Greetings\n\nJust type naturally!"
  ]],
  [/thank|thanks|shukriya|dhanyawad/i, [
    "You're welcome! 😊 Happy to help!",
    "Anytime! That's what I'm here for. 🤖",
    "No problem at all! 🙌"
  ]],
  [/bye|goodbye|exit|quit|alvida/i, [
    "Goodbye! 👋 It was great chatting with you!",
    "See you next time! Keep coding! 💻",
    "Bye bye! Stay awesome! 🚀"
  ]],
  [/sad|unhappy|depressed|dukhi|bura/i, [
    "I'm sorry to hear that. 😔 Every storm passes. You've got this! 💪",
    "Sending good vibes your way! 🌟 Things will get better!",
    "It's okay to feel low sometimes. Want a joke to cheer up? 😊"
  ]],
  [/happy|great|awesome|khush|mast|amazing/i, [
    "That's wonderful! 🎉 Keep that energy going!",
    "Yay! Happiness is contagious — you made my day! 😄",
    "Love that positive energy! 🚀"
  ]],
];

const fallbacks = [
  "Hmm, I'm not sure about that. 🤔 Try asking something else!",
  "That's beyond my knowledge right now. Still learning! 🧠",
  "Interesting! But I don't have a response for that yet. 😅",
  "Could you rephrase that? I want to help! 💬"
];

function getResponse(input) {
  for (const [pattern, responses] of rules) {
    if (pattern.test(input)) {
      const r = responses[Math.floor(Math.random() * responses.length)];
      return typeof r === 'function' ? r() : r;
    }
  }
  return fallbacks[Math.floor(Math.random() * fallbacks.length)];
}

function addMsg(text, sender) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.innerHTML = `
    <div class="avatar">${sender === 'bot' ? '🤖' : '👤'}</div>
    <div class="bubble">${text}</div>
  `;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg bot typing'; div.id = 'typing';
  div.innerHTML = `<div class="avatar">🤖</div><div class="bubble">typing...</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function sendMsg() {
  const inp = document.getElementById('userInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  addMsg(text, 'user');
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMsg(getResponse(text), 'bot');
  }, 600);
}

function quickSend(text) {
  document.getElementById('userInput').value = text;
  sendMsg();
}

// Welcome message
setTimeout(() => addMsg("Hello! I'm CodBot 🤖\nI'm a rule-based chatbot built for CodSoft AI Internship.\nHow can I help you today?", 'bot'), 300);
</script>
</body>
</html>
